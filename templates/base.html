<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}DO AI Avatar – Cloudconf Bangalore{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <!-- Bootstrap 5 -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <!-- Custom styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />

  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- ===== Navbar ===== -->
  <nav class="navbar navbar-expand-lg navbar-dark do-navbar">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <img
          src="{{ url_for('static', filename='img/do-logo.svg') }}"
          alt="DigitalOcean"
          height="28"
          onerror="this.style.display='none'"
        />
        <span class="fw-700 brand-title">DO&nbsp;AI&nbsp;Avatar</span>
      </a>
      <div class="ms-auto d-flex align-items-center gap-3">
        <span class="badge badge-event px-3 py-2">
          <i class="fa-solid fa-location-dot me-1"></i> Cloudconf&nbsp;Bangalore
        </span>
      </div>
    </div>
  </nav>

  <!-- ===== Page content ===== -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- ===== Footer ===== -->
  <footer class="do-footer py-4">
    <div class="container text-center">
      <p class="mb-1 footer-text">
        Built with&nbsp;
        <i class="fa-solid fa-heart text-danger"></i>&nbsp; using
        <strong>DigitalOcean Serverless Inference</strong>
        at&nbsp;<strong>Cloudconf, Bangalore</strong>
      </p>
      <p class="mb-0 footer-sub">
        Powered by
        <a href="https://www.digitalocean.com/products/gradient-ai-platform" target="_blank" rel="noopener">
          DigitalOcean Gradient AI Platform
        </a>
        &amp; fal-ai/flux/schnell
      </p>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFJg0S4TjMIzLKUFgGDgW9n3W+P"
    crossorigin="anonymous"
  ></script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
